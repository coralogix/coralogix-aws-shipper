[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  { id = "RUSTSEC-2025-0012", reason = "Transitive through coralogix-sdk-rust backoff; no safe upgrade is available in this repository." },
  { id = "RUSTSEC-2024-0384", reason = "Transitive through backoff; no safe upgrade is available in this repository." },
  { id = "RUSTSEC-2024-0388", reason = "Transitive through starlark; requires upstream dependency replacement." },
  { id = "RUSTSEC-2024-0436", reason = "Transitive through starlark; requires upstream dependency replacement." },
  { id = "RUSTSEC-2025-0057", reason = "Transitive through starlark_map; requires upstream dependency replacement." },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "0BSD",
  "BSL-1.0",
  "CC0-1.0",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
  "OpenSSL",
]

[[licenses.clarify]]
crate = "cx_sdk_core"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "cx_sdk_rest_logs"
expression = "Apache-2.0"
license-files = []

[bans]
multiple-versions = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "ssh://git@github.com/coralogix/coralogix-sdk-rust",
]
