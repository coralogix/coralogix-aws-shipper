name: Publish Release Candidate to Staging

on:
  push:
    branches:
      - dev
  
  workflow_dispatch: 

env:
  AWS_DEFAULT_REGION: eu-west-1
  AWS_SERVERLESS_BUCKET: coralogix-serverless-repo-staging
  AWS_S3_PREFIX: coralogix-aws-shipper-staging

jobs:
  build:
    name: build
    # Each arch builds on its own native runner so the FIPS binary is compiled
    # natively inside the Amazon Linux 2023 container (no cross-compile, glibc 2.34).
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: arm64
            runner: ubuntu-24.04-arm
          - target: x86-64
            runner: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # python is still needed so `sam build` can package the python
      # CustomResourceFunction (runtime python3.12); cargo-lambda is no longer
      # installed on the host because the Rust build happens in the AL2023 container.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: start ssh agent for rust private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build AL2023 builder image (cached, native ${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile.builder
          tags: fips-al2023-builder:latest
          load: true
          cache-from: type=gha,scope=publish-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.target }}

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo-registry
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.target }}-

      - name: build FIPS bootstrap (AL2023, native ${{ matrix.target }})
        run: |
          mkdir -p ~/.cargo-registry
          docker run --rm \
            -v "$PWD":/work -w /work \
            -v ~/.cargo-registry:/usr/local/cargo/registry \
            -v "$SSH_AUTH_SOCK":/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
            -e LAMBDA_ARCH=${{ matrix.target }} \
            fips-al2023-builder:latest \
            bash /work/ci/fips-build.sh

      - name: sam build (reuse prebuilt FIPS bootstrap)
        env:
          RUST_ARCH: ${{ matrix.target }}
          PREBUILT_BOOTSTRAP: ${{ github.workspace }}/.build-artifacts/bootstrap
        run: sam build

      - name: verify glibc compatibility
        run: |
          MAX_GLIBC="2.34"
          BOOTSTRAP=$(find .aws-sam -name bootstrap -type f | head -1)
          if [ -z "$BOOTSTRAP" ]; then
            echo "ERROR: bootstrap binary was not found under .aws-sam"
            exit 1
          fi
          FOUND=$(readelf -V "$BOOTSTRAP" 2>/dev/null | grep -oP 'GLIBC_\K[\d.]+' | sort -V | tail -1 || true)
          if [ -z "$FOUND" ]; then
            echo "No GLIBC symbol versioning found; OK (statically linked)"
            exit 0
          fi
          if [ "$(printf '%s\n' "$MAX_GLIBC" "$FOUND" | sort -V | tail -1)" != "$MAX_GLIBC" ]; then
            echo "ERROR: binary requires GLIBC $FOUND but Lambda maximum is $MAX_GLIBC"
            exit 1
          fi
          echo "OK: max GLIBC requirement is $FOUND (<= $MAX_GLIBC)"

      - name: package
        run: |
          sam package \
            --s3-bucket ${{ env.AWS_SERVERLESS_BUCKET }} \
            --s3-prefix '${{ env.AWS_S3_PREFIX }}/${{ matrix.target }}' \
            --output-template-file packaged.yaml

          # change author field
          yq -i '.Metadata."AWS::ServerlessRepo::Application".Author = "coralogix-cdo-dev"' packaged.yaml 

      - name: s3upload-x86-64-build
        if: ${{ matrix.target == 'x86-64' }}
        run: |
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "LambdaLayer" or .key == "LambdaFunctionDefault") | .value.Properties | to_entries | .[] | select(.key == "ContentUri" or .key == "CodeUri") | .value' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}/coralogix-aws-shipper-${{ matrix.target }}.zip

      - name: store-arm64-package
        uses: actions/upload-artifact@v4
        # only store the arm64 package as this is the
        # only one that will be published to SAR
        if: ${{ matrix.target == 'arm64' }}
        with:
          name: packaged.yaml
          path: packaged.yaml

  publish:
    name: publish-rc
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' || success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: download
        uses: actions/download-artifact@v4
        with:
          name: packaged.yaml

      - name: publish
        run: sam publish --template packaged.yaml

      - name: store
        run: |
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "LambdaLayer" or .key == "LambdaFunctionDefault") | .value.Properties | to_entries | .[] | select(.key == "ContentUri" or .key == "CodeUri") | .value' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}/coralogix-aws-shipper.zip

          # upload custom resource
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "CustomResourceFunction") | .value.Properties | to_entries | .[] | select(.key == "CodeUri") | .value' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}/coralogix-aws-shipper-custom-resource.zip
