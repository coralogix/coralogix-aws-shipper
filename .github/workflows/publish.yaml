name: Publish

on:
  push:
    paths:
      - 'template.yaml'

  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: eu-central-1
  AWS_SERVERLESS_BUCKET: coralogix-serverless-repo
  AWS_S3_PREFIX: coralogix-aws-shipper
  REPO_BUCKET_PREFIX: coralogix-serverless-repo

jobs:
  check_version:
    if: ${{ github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      template_updated: ${{ env.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Fetches the last two commits for comparison

      - name: install yq
        run: sudo snap install yq

      - name: check if specific value has changed
        id: check_change
        run: |
          set -xv
          # Extract the value from the current commit
          current=$(yq '.Metadata."AWS::ServerlessRepo::Application".SemanticVersion' template.yaml)
          echo "current_version=$current" >> $GITHUB_ENV

          # Extract the value from the previous commit
          git checkout HEAD^ template.yaml
          previous=$(yq '.Metadata."AWS::ServerlessRepo::Application".SemanticVersion' template.yaml)

          # Compare the two values
          echo "updated=false" >> $GITHUB_ENV
          [ "$current" != "$previous" ] && echo "updated=true" >> $GITHUB_ENV
          
          lastcommit=$(git log -1 --pretty=%B)
          [[ $lastcommit =~ .*skip-version-check.* ]] && echo "updated=true" >> $GITHUB_ENV

          set +xv

      - name: create tag
        if: env.updated == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/${{ env.current_version }}',
                sha: context.sha
              })
            } catch (e) {
              if (e.status === 422 && e.message.includes('Reference already exists')) {
                core.warning(`Tag ${{ env.current_version }} already exists — skipping.`)
              } else {
                throw e
              }
            }

  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: sam validate
        working-directory: ./
        run: sam validate

  build:
    name: build
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' || success() }}
    # Each arch builds on its own native runner so the FIPS binary is compiled
    # natively inside the Amazon Linux 2023 container (no cross-compile, glibc 2.34).
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: arm64
            runner: ubuntu-24.04-arm
          - target: x86-64
            runner: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # python is still needed so `sam build` can package the python
      # CustomResourceFunction (runtime python3.12); cargo-lambda is no longer
      # installed on the host because the Rust build happens in the AL2023 container.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
        
      - name: start ssh agent for rust private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build AL2023 builder image (cached, native ${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile.builder
          tags: fips-al2023-builder:latest
          load: true
          cache-from: type=gha,scope=publish-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.target }}

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo-registry
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.target }}-

      - name: install yq
        run: sudo snap install yq

      - name: get_version
        id: get_version
        run: |
          set -xv
          # Extract the value from the current commit
          current=$(yq '.Metadata."AWS::ServerlessRepo::Application".SemanticVersion' template.yaml)
          echo "current_version=$current" >> $GITHUB_ENV

      - name: build FIPS bootstrap (AL2023, native ${{ matrix.target }})
        run: |
          mkdir -p ~/.cargo-registry
          docker run --rm \
            -v "$PWD":/work -w /work \
            -v ~/.cargo-registry:/usr/local/cargo/registry \
            -v "$SSH_AUTH_SOCK":/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
            -e LAMBDA_ARCH=${{ matrix.target }} \
            fips-al2023-builder:latest \
            bash /work/ci/fips-build.sh

      - name: sam build (reuse prebuilt FIPS bootstrap)
        env:
          RUST_ARCH: ${{ matrix.target }}
          PREBUILT_BOOTSTRAP: ${{ github.workspace }}/.build-artifacts/bootstrap
        run: sam build

      - name: verify glibc compatibility
        run: |
          MAX_GLIBC="2.34"
          BOOTSTRAP=$(find .aws-sam -name bootstrap -type f | head -1)
          if [ -z "$BOOTSTRAP" ]; then
            echo "ERROR: bootstrap binary was not found under .aws-sam"
            exit 1
          fi
          FOUND=$(readelf -V "$BOOTSTRAP" 2>/dev/null | grep -oP 'GLIBC_\K[\d.]+' | sort -V | tail -1)
          if [ -z "$FOUND" ]; then
            echo "No GLIBC symbol versioning found; OK (statically linked)"
            exit 0
          fi
          if [ "$(printf '%s\n' "$MAX_GLIBC" "$FOUND" | sort -V | tail -1)" != "$MAX_GLIBC" ]; then
            echo "ERROR: binary requires GLIBC $FOUND but Lambda maximum is $MAX_GLIBC"
            exit 1
          fi
          echo "OK: max GLIBC requirement is $FOUND (<= $MAX_GLIBC)"

      - name: package
        run: |
          sam package \
            --s3-bucket ${{ env.AWS_SERVERLESS_BUCKET }} \
            --s3-prefix '${{ env.AWS_S3_PREFIX }}/${{ matrix.target }}' \
            --output-template-file packaged.yaml
      

      - name: s3upload-x86-64-build
        if: ${{ matrix.target == 'x86-64' }}
        run: |
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "LambdaLayer" or .key == "LambdaFunction") | .value.Properties | to_entries | .[] | select(.key == "ContentUri" or .key == "CodeUri") | .value' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}-${{ env.AWS_DEFAULT_REGION }}/coralogix-aws-shipper-${{ matrix.target }}.zip
      
      - name: s3upload-${{ matrix.target }}-build-versioned
        run: |
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "LambdaLayer" or .key == "LambdaFunction") | .value.Properties | to_entries | .[] | select(.key == "ContentUri" or .key == "CodeUri") | .value' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}-${{ env.AWS_DEFAULT_REGION }}/coralogix-aws-shipper-${{ matrix.target }}-${{ env.current_version }}.zip
        
      - name: store-arm64-package
        uses: actions/upload-artifact@v7
        # only store the arm64 package as this is the
        # only one that will be published to SAR
        if: ${{ matrix.target == 'arm64' }}
        with:
          name: packaged.yaml
          path: packaged.yaml

  publish:
    name: publish
    needs: [check_version , build]
    if: ${{ github.event_name == 'workflow_dispatch' || (success() && needs.check_version.outputs.template_updated == 'true' && github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_SERVERLESS_BUCKET: coralogix-serverless-repo
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: download
        uses: actions/download-artifact@v8
        with:
          name: packaged.yaml

      - name: install yq
        run: sudo snap install yq

      - name: publish
        run: |
          VERSION=$(yq -r '.Metadata."AWS::ServerlessRepo::Application".SemanticVersion' packaged.yaml)
          DESCRIPTION=$(yq -r '.Metadata."AWS::ServerlessRepo::Application".Description' packaged.yaml)
          SOURCE_CODE_URL=$(yq -r '.Metadata."AWS::ServerlessRepo::Application".SourceCodeUrl' packaged.yaml)

          # Upload template to S3 to bypass SAR's 51,200-byte TemplateBody limit
          # (sam publish always uses TemplateBody; our template exceeds this limit)
          TEMPLATE_KEY="${{ env.AWS_S3_PREFIX }}/templates/packaged-${VERSION}.yaml"
          aws s3 cp packaged.yaml "s3://${{ env.AWS_SERVERLESS_BUCKET }}/${TEMPLATE_KEY}"
          TEMPLATE_URL="https://s3.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/${{ env.AWS_SERVERLESS_BUCKET }}/${TEMPLATE_KEY}"

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          APP_ID="arn:aws:serverlessrepo:${{ env.AWS_DEFAULT_REGION }}:${ACCOUNT_ID}:applications/coralogix-aws-shipper"

          aws serverlessrepo update-application \
            --application-id "${APP_ID}" \
            --description "${DESCRIPTION}"

          aws serverlessrepo create-application-version \
            --application-id "${APP_ID}" \
            --semantic-version "${VERSION}" \
            --template-url "${TEMPLATE_URL}" \
            --source-code-url "${SOURCE_CODE_URL}"

      - name: store
        run: |
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "LambdaLayer" or .key == "LambdaFunction") | .value.Properties | to_entries | .[] | select(.key == "ContentUri" or .key == "CodeUri") | .value' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}-${{ env.AWS_DEFAULT_REGION }}/coralogix-aws-shipper.zip

          # upload custom resource
          aws s3 cp \
            $(yq -r '.Resources | to_entries | .[] | select(.key == "CustomResourceFunction") | .value.Properties | .CodeUri' packaged.yaml) \
            s3://${{ env.AWS_SERVERLESS_BUCKET }}-${{ env.AWS_DEFAULT_REGION }}/coralogix-aws-shipper-custom-resource.zip
